<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мой трекер</title>

<style>
body{font-family:Arial;background:#f4efe9;padding:20px}
.section{background:white;padding:15px;border-radius:10px;margin-bottom:10px}
.task{margin:5px 0}
button{padding:6px 10px;background:#b59374;color:white;border:none;border-radius:6px}
</style>
</head>

<body>

<h2>Мой день</h2>

<div class="section">
<h3>Вес</h3>
<input id="weight" type="number" placeholder="кг">
<button onclick="saveWeight()">сохранить</button>
<div id="history"></div>
</div>

<div class="section">
<h3>Утро</h3>
<label class="task"><input type="checkbox"> вода</label>
<label class="task"><input type="checkbox"> железо</label>
<label class="task"><input type="checkbox"> уход</label>
<label class="task"><input type="checkbox"> вакуум</label>
<label class="task"><input type="checkbox"> 100 прыжков</label>
<label class="task"><input type="checkbox"> торговля</label>
</div>

<div class="section">
<h3>День</h3>
<label class="task"><input type="checkbox"> спорт</label>
<label class="task"><input type="checkbox"> завтрак</label>
<label class="task"><input type="checkbox"> витамин D</label>
<label class="task"><input type="checkbox"> омега</label>
<label class="task"><input type="checkbox"> йод</label>
<label class="task"><input type="checkbox"> работа</label>
<label class="task"><input type="checkbox"> обед</label>
</div>

<div class="section">
<h3>Шаги</h3>
<span id="steps">0</span>/10000
<br><br>
<button onclick="steps+=1000;update()">+1000</button>
</div>

<div class="section">
<h3>Вода</h3>
<span id="water">0</span>/2000
<br><br>
<button onclick="water+=300;update()">+300</button>
</div>

<div class="section">
<h3>Вечер</h3>
<label class="task"><input type="checkbox"> казеин</label>
<label class="task"><input type="checkbox"> коллаген</label>
<label class="task"><input type="checkbox"> магний</label>
<label class="task"><input type="checkbox"> сон</label>
</div>

<script>
let steps=0
let water=0

function update(){
document.getElementById("steps").innerText=steps
document.getElementById("water").innerText=water
}

function saveWeight(){
let w=document.getElementById("weight").value
let h=JSON.parse(localStorage.getItem("w")||"[]")
h.push(new Date().toLocaleDateString()+" "+w)
localStorage.setItem("w",JSON.stringify(h))
document.getElementById("history").innerHTML=h.join("<br>")
}
</script>

</body>
</html>
